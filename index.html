<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Azeza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: 42px;
    }
    p {
      opacity: 0.8;
    }
    input {
      padding: 12px;
      width: 70%;
      border: none;
      border-radius: 4px;
      margin-top: 10px;
    }
    button {
      padding: 12px 20px;
      background: #00ff88;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Azeza™</h1>
    <p>Aligned Zone Execution. Zero Ambiguity.</p>
    <p>Get early access to the model.</p>

    <input type="email" placeholder="Enter your email">
    <br>
    <button>Join Now</button>
  </div>
</body>
</html>
